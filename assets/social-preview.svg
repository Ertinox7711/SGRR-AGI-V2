<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="brand-grad-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="inner-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="bg-fade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080d"/>
      <stop offset="55%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="34%" r="46%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.16"/>
      <stop offset="60%" stop-color="#818cf8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dot-grid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#818cf8" opacity="0.10"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-fade)"/>
  <rect width="1280" height="640" fill="url(#dot-grid)"/>
  <rect width="1280" height="640" fill="url(#center-glow)"/>

  <!-- Corner brackets (brand continuity) -->
  <path d="M 60 64 L 40 64 L 40 88" fill="none" stroke="url(#brand-grad-h)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M 1220 576 L 1240 576 L 1240 552" fill="none" stroke="url(#brand-grad-h)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- ============ Hexagon logo (centered top) ============ -->
  <g transform="translate(558,52) scale(0.64)">
    <polygon points="128,22 219.8,75 219.8,181 128,234 36.2,181 36.2,75"
      fill="none" stroke="url(#brand-grad)" stroke-width="1.8" opacity="0.6"/>
    <polygon points="128,38 205.9,83 205.9,173 128,218 50.1,173 50.1,83"
      fill="url(#inner-glow)" stroke="url(#brand-grad)" stroke-width="0.8" opacity="0.35"/>
    <circle cx="128" cy="22" r="3.5" fill="#22d3ee" opacity="0.7" filter="url(#glow-sm)"/>
    <circle cx="219.8" cy="75" r="3.5" fill="#818cf8" opacity="0.7" filter="url(#glow-sm)"/>
    <circle cx="219.8" cy="181" r="3.5" fill="#a78bfa" opacity="0.7" filter="url(#glow-sm)"/>
    <circle cx="128" cy="234" r="3.5" fill="#a78bfa" opacity="0.7" filter="url(#glow-sm)"/>
    <circle cx="36.2" cy="181" r="3.5" fill="#818cf8" opacity="0.7" filter="url(#glow-sm)"/>
    <circle cx="36.2" cy="75" r="3.5" fill="#22d3ee" opacity="0.7" filter="url(#glow-sm)"/>
    <line x1="128" y1="128" x2="219.8" y2="75" stroke="#818cf8" stroke-width="0.8" opacity="0.18"/>
    <line x1="128" y1="128" x2="36.2" y2="75" stroke="#22d3ee" stroke-width="0.8" opacity="0.18"/>
    <line x1="128" y1="128" x2="219.8" y2="181" stroke="#a78bfa" stroke-width="0.8" opacity="0.18"/>
    <line x1="128" y1="128" x2="36.2" y2="181" stroke="#818cf8" stroke-width="0.8" opacity="0.18"/>
    <path d="M 98,88 C 98,72 162,72 162,88 C 162,104 98,104 98,120 C 98,128 108,132 128,132"
      fill="none" stroke="url(#brand-grad-h)" stroke-width="6" stroke-linecap="round" filter="url(#glow-sm)"/>
    <path d="M 128,124 C 148,124 158,128 158,136 C 158,152 94,152 94,168 C 94,184 158,184 158,168"
      fill="none" stroke="url(#brand-grad-h)" stroke-width="6" stroke-linecap="round" filter="url(#glow-sm)"/>
    <circle cx="98" cy="88" r="4.5" fill="#22d3ee" opacity="0.85" filter="url(#glow-sm)"/>
    <circle cx="162" cy="88" r="3.5" fill="#818cf8" opacity="0.75" filter="url(#glow-sm)"/>
    <circle cx="128" cy="128" r="5" fill="#818cf8" opacity="0.9" filter="url(#glow-lg)"/>
    <circle cx="94" cy="168" r="3.5" fill="#818cf8" opacity="0.75" filter="url(#glow-sm)"/>
    <circle cx="158" cy="168" r="4.5" fill="#a78bfa" opacity="0.85" filter="url(#glow-sm)"/>
    <circle cx="128" cy="128" r="2" fill="white" opacity="0.6"/>
  </g>

  <!-- Wordmark -->
  <text x="640" y="358" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="112" font-weight="800" letter-spacing="-1"
    fill="url(#brand-grad-h)" filter="url(#glow)">SGRR AGI V2</text>

  <!-- Underline -->
  <rect x="345" y="382" width="590" height="3" rx="1.5" fill="url(#brand-grad-h)" opacity="0.85"/>

  <!-- Tagline -->
  <text x="640" y="432" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="27" font-weight="400" letter-spacing="0.2"
    fill="#e6edf3" opacity="0.88">The scaffold that turns Claude Code into an autonomous agent.</text>

  <!-- Keyword strip -->
  <text x="640" y="486" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="20" font-weight="600" letter-spacing="0.3"
    fill="#9aa4b2">Skills-first<tspan fill="#22d3ee" font-weight="700">&#160;&#160;&#183;&#160;&#160;</tspan>Pitfall coach<tspan fill="#818cf8" font-weight="700">&#160;&#160;&#183;&#160;&#160;</tspan>File memory<tspan fill="#a78bfa" font-weight="700">&#160;&#160;&#183;&#160;&#160;</tspan>/session-check<tspan fill="#22d3ee" font-weight="700">&#160;&#160;&#183;&#160;&#160;</tspan>Self-updating</text>

  <!-- Divider -->
  <rect x="430" y="524" width="420" height="1" fill="#30363d" opacity="0.7"/>

  <!-- Handle + star CTA -->
  <text x="640" y="566" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="23" font-weight="500" letter-spacing="0.3"
    fill="#c9d1d9"><tspan fill="#a78bfa" font-size="22">&#9733;&#160;&#160;</tspan>github.com/Ertinox7711/SGRR-AGI-V2</text>
</svg>
