<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="arrow-grad-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#818cf8"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <filter id="box-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" fill="#0a0a0f"/>
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="0.5" cy="0.5" r="0.6" fill="#818cf8" opacity="0.08"/>
  </pattern>
  <rect width="1000" height="600" fill="url(#dots)"/>

  <!-- Title -->
  <text x="500" y="44" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" letter-spacing="0.5" fill="#e6edf3">Architecture — SGRR AGI V2</text>
  <rect x="200" y="52" width="600" height="1.5" rx="0.75" fill="url(#brand-grad)" opacity="0.5"/>

  <!-- ═══ SECTION 1: comment une Skill se déclenche ═══ -->
  <text x="500" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="500" fill="#7d8590" letter-spacing="1.5">DÉCLENCHEMENT D'UNE SKILL — 2 chemins</text>

  <!-- Box: Message (trigger) -->
  <rect x="56" y="98" width="132" height="72" rx="8" fill="#161b22" stroke="#22d3ee" stroke-width="1.2" filter="url(#box-shadow)"/>
  <text x="122" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#22d3ee">Tout message</text>
  <text x="122" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#7d8590">Claude l'évalue</text>
  <text x="122" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#7d8590">à chaque tour</text>

  <!-- Top lane: Commande → Agent → Skill -->
  <rect x="252" y="104" width="150" height="50" rx="8" fill="#161b22" stroke="#22d3ee" stroke-width="1.1" filter="url(#box-shadow)"/>
  <text x="327" y="125" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#22d3ee">Commande</text>
  <text x="327" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">/slash · optionnelle</text>

  <rect x="442" y="104" width="178" height="50" rx="8" fill="#161b22" stroke="#818cf8" stroke-width="1.1" filter="url(#box-shadow)"/>
  <text x="531" y="125" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" fill="#818cf8">Agent</text>
  <text x="531" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">sous-agent · contexte isolé</text>

  <!-- Skill box (tall, target of both lanes) -->
  <rect x="700" y="98" width="226" height="86" rx="9" fill="#12101c" stroke="#a78bfa" stroke-width="1.4" filter="url(#box-shadow)"/>
  <text x="813" y="128" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="700" fill="#a78bfa">Skill</text>
  <text x="813" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#7d8590">savoir / procédure</text>
  <text x="813" y="163" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" fill="#7d8590">réutilisable, injectée</text>

  <!-- Arrows: orchestration lane -->
  <line x1="188" y1="126" x2="252" y2="126" stroke="url(#arrow-grad-h)" stroke-width="1.7" marker-end="url(#arrowhead)"/>
  <line x1="402" y1="129" x2="442" y2="129" stroke="#818cf8" stroke-width="1.7" marker-end="url(#arrowhead)"/>
  <line x1="620" y1="129" x2="700" y2="124" stroke="#818cf8" stroke-width="1.7" marker-end="url(#arrowhead)"/>
  <text x="660" y="116" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9" fill="#818cf8" opacity="0.85">orchestration</text>

  <!-- Arrow: DIRECT / auto-invocation (no command) -->
  <path d="M150,170 L150,196 L690,196" fill="none" stroke="#22d3ee" stroke-width="1.7" stroke-dasharray="5 3" marker-end="url(#arrowhead-cyan)"/>
  <line x1="690" y1="196" x2="700" y2="176" stroke="#22d3ee" stroke-width="1.7" stroke-dasharray="5 3"/>
  <text x="430" y="212" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10.5" font-weight="600" fill="#22d3ee">auto-invocation — Claude déclenche la skill dès qu'elle est pertinente, SANS commande</text>

  <!-- ═══ MODEL band ═══ -->
  <rect x="80" y="238" width="840" height="46" rx="8" fill="#0f1318" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 3" opacity="0.9"/>
  <text x="500" y="266" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="12.5" font-weight="600" fill="#e6edf3"><tspan fill="#7d8590" font-size="10" letter-spacing="1.5">MODÈLE   </tspan><tspan fill="#22d3ee">Opus</tspan><tspan fill="#7d8590"> boucle principale   ·   </tspan><tspan fill="#818cf8">Sonnet</tspan><tspan fill="#7d8590"> sous-agents (config CLAUDE_CODE_SUBAGENT_MODEL)</tspan></text>

  <!-- connector -->
  <line x1="500" y1="284" x2="500" y2="312" stroke="#7d8590" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>

  <!-- ═══ FOUNDATIONS ═══ -->
  <text x="500" y="308" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="500" fill="#7d8590" letter-spacing="1.5">LES 6 FONDATIONS</text>

  <!-- 1 settings.json -->
  <rect x="50" y="320" width="140" height="92" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="50" y="320" width="140" height="3" rx="1.5" fill="#22d3ee" opacity="0.7"/>
  <text x="120" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#e6edf3">settings.json</text>
  <text x="120" y="366" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">Filet de permissions</text>
  <text x="120" y="381" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">allow · ask · deny</text>
  <text x="120" y="401" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#22d3ee" opacity="0.7">la seule loi réelle</text>

  <!-- 2 Hooks -->
  <rect x="202" y="320" width="140" height="92" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="202" y="320" width="140" height="3" rx="1.5" fill="#818cf8" opacity="0.7"/>
  <text x="272" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#e6edf3">Hooks</text>
  <text x="272" y="366" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">Injection de contexte</text>
  <text x="272" y="381" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">+ tips à chaque tour</text>
  <text x="272" y="401" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#818cf8" opacity="0.7">lifecycle</text>

  <!-- 3 Mémoire -->
  <rect x="354" y="320" width="140" height="92" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="354" y="320" width="140" height="3" rx="1.5" fill="#a78bfa" opacity="0.7"/>
  <text x="424" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#e6edf3">Mémoire</text>
  <text x="424" y="366" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">Fichiers persistants</text>
  <text x="424" y="381" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">+ index MEMORY.md</text>
  <text x="424" y="401" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#a78bfa" opacity="0.7">persistance</text>

  <!-- 4 MCP -->
  <rect x="506" y="320" width="140" height="92" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="506" y="320" width="140" height="3" rx="1.5" fill="#22d3ee" opacity="0.7"/>
  <text x="576" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#e6edf3">MCP</text>
  <text x="576" y="366" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">context7 · playwright</text>
  <text x="576" y="381" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">docs live · navigateur</text>
  <text x="576" y="401" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#22d3ee" opacity="0.7">outils externes</text>

  <!-- 5 Plugins -->
  <rect x="658" y="320" width="140" height="92" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="658" y="320" width="140" height="3" rx="1.5" fill="#818cf8" opacity="0.7"/>
  <text x="728" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#e6edf3">Plugins</text>
  <text x="728" y="366" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">superpowers</text>
  <text x="728" y="381" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">feature-dev · …</text>
  <text x="728" y="401" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#818cf8" opacity="0.7">skills + agents</text>

  <!-- 6 Rules -->
  <rect x="810" y="320" width="140" height="92" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="810" y="320" width="140" height="3" rx="1.5" fill="#a78bfa" opacity="0.7"/>
  <text x="880" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700" fill="#e6edf3">Rules</text>
  <text x="880" y="366" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">Contexte paresseux</text>
  <text x="880" y="381" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#7d8590">paths: · CLAUDE.md</text>
  <text x="880" y="401" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="9.5" fill="#a78bfa" opacity="0.7">instruction</text>

  <!-- gather to output -->
  <line x1="120" y1="412" x2="120" y2="438" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="272" y1="412" x2="272" y2="438" stroke="#818cf8" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="424" y1="412" x2="424" y2="438" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="576" y1="412" x2="576" y2="438" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="728" y1="412" x2="728" y2="438" stroke="#818cf8" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="880" y1="412" x2="880" y2="438" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="120" y1="438" x2="880" y2="438" stroke="#7d8590" stroke-width="0.8" opacity="0.2"/>
  <line x1="500" y1="438" x2="500" y2="452" stroke="#7d8590" stroke-width="0.9" opacity="0.3" marker-end="url(#arrowhead)"/>

  <!-- Output -->
  <rect x="280" y="456" width="440" height="56" rx="8" fill="#0f1318" stroke="url(#brand-grad)" stroke-width="1.5" filter="url(#box-shadow)"/>
  <text x="500" y="479" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="500" fill="#7d8590" letter-spacing="1">SORTIE</text>
  <text x="500" y="498" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="600" fill="#e6edf3">Code · Fichiers · Actions · Commits · Deploy</text>

  <!-- Footer with creator credit -->
  <text x="500" y="556" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="600" fill="#7d8590" opacity="0.7">Créé par <tspan fill="#a78bfa">SGRR</tspan>  ·  SGRR AGI V2 — Claude Code Power-Rig Scaffold</text>
</svg>
