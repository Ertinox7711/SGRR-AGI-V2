<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="brand-grad-v" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="arrow-grad-h" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#818cf8"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22d3ee"/>
    </marker>
    <filter id="box-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="640" fill="#0a0a0f"/>

  <!-- Subtle dot grid -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="0.5" cy="0.5" r="0.6" fill="#818cf8" opacity="0.08"/>
  </pattern>
  <rect width="1000" height="640" fill="url(#dots)"/>

  <!-- Title -->
  <text x="500" y="52" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="22" font-weight="700" letter-spacing="0.5"
    fill="#e6edf3">Architecture — SGRR AGI V2</text>
  <rect x="200" y="60" width="600" height="1.5" rx="0.75" fill="url(#brand-grad)" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════
       ROW 1: Command → Agent → Skill  (y=100)
  ═══════════════════════════════════════════ -->

  <!-- Box: Commande -->
  <rect x="120" y="96" width="200" height="64" rx="8" fill="#161b22" stroke="#22d3ee" stroke-width="1.2" filter="url(#box-shadow)"/>
  <text x="220" y="122" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#22d3ee">Commande</text>
  <text x="220" y="142" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" fill="#7d8590">/slash · prompt user</text>

  <!-- Arrow 1 -->
  <line x1="320" y1="128" x2="386" y2="128" stroke="url(#arrow-grad-h)" stroke-width="1.8" marker-end="url(#arrowhead)"/>

  <!-- Box: Agent (sous-agent) -->
  <rect x="390" y="96" width="220" height="64" rx="8" fill="#161b22" stroke="#818cf8" stroke-width="1.2" filter="url(#box-shadow)"/>
  <text x="500" y="122" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#818cf8">Agent</text>
  <text x="500" y="142" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" fill="#7d8590">sous-agent isolé · contexte propre</text>

  <!-- Arrow 2 -->
  <line x1="610" y1="128" x2="676" y2="128" stroke="#818cf8" stroke-width="1.8" marker-end="url(#arrowhead)"/>

  <!-- Box: Skill -->
  <rect x="680" y="96" width="200" height="64" rx="8" fill="#161b22" stroke="#a78bfa" stroke-width="1.2" filter="url(#box-shadow)"/>
  <text x="780" y="122" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#a78bfa">Skill</text>
  <text x="780" y="142" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" fill="#7d8590">comportement spécialisé injecté</text>

  <!-- ═══════════════════════════════════════════
       ROW 2: Modèle band  (y=200)
  ═══════════════════════════════════════════ -->
  <rect x="80" y="196" width="840" height="52" rx="8" fill="#0f1318" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 3" opacity="0.9"/>
  <text x="500" y="217" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" font-weight="500" fill="#7d8590" letter-spacing="1.5">MODÈLE</text>
  <text x="500" y="236" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#e6edf3">
    <tspan fill="#22d3ee">Opus</tspan>
    <tspan fill="#7d8590"> — boucle principale  ·  </tspan>
    <tspan fill="#818cf8">Sonnet</tspan>
    <tspan fill="#7d8590"> — sous-agents</tspan>
  </text>

  <!-- Connector: Row1 → Row2 band -->
  <line x1="220" y1="160" x2="220" y2="196" stroke="#22d3ee" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>
  <line x1="500" y1="160" x2="500" y2="196" stroke="#818cf8" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>
  <line x1="780" y1="160" x2="780" y2="196" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════
       ROW 3: Foundation blocks  (y=310)
  ═══════════════════════════════════════════ -->

  <!-- Connector band → foundations -->
  <line x1="500" y1="248" x2="500" y2="300" stroke="#7d8590" stroke-width="1" stroke-dasharray="3 2" opacity="0.3"/>
  <line x1="500" y1="300" x2="114" y2="300" stroke="#7d8590" stroke-width="1" opacity="0.2"/>
  <line x1="500" y1="300" x2="886" y2="300" stroke="#7d8590" stroke-width="1" opacity="0.2"/>

  <!-- Row 3 label -->
  <text x="500" y="294" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" font-weight="500" fill="#7d8590" letter-spacing="1.5">FONDATIONS</text>

  <!-- 6 foundation boxes — evenly spaced -->
  <!-- Box width=140, gap=12, total=6*140+5*12=900, offset=50 -->

  <!-- 1: settings.json -->
  <rect x="50" y="308" width="140" height="90" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="50" y="308" width="140" height="3" rx="1.5" fill="#22d3ee" opacity="0.7"/>
  <text x="120" y="335" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#e6edf3">settings.json</text>
  <text x="120" y="354" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">Filet de permissions</text>
  <text x="120" y="370" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">allow · ask · deny</text>
  <text x="120" y="389" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#22d3ee" opacity="0.7">permissions</text>

  <!-- 2: Hooks -->
  <rect x="202" y="308" width="140" height="90" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="202" y="308" width="140" height="3" rx="1.5" fill="#818cf8" opacity="0.7"/>
  <text x="272" y="335" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#e6edf3">Hooks</text>
  <text x="272" y="354" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">Injection de contexte</text>
  <text x="272" y="370" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">par tour de boucle</text>
  <text x="272" y="389" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#818cf8" opacity="0.7">lifecycle</text>

  <!-- 3: Mémoire -->
  <rect x="354" y="308" width="140" height="90" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="354" y="308" width="140" height="3" rx="1.5" fill="#a78bfa" opacity="0.7"/>
  <text x="424" y="335" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#e6edf3">Mémoire</text>
  <text x="424" y="354" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">Fichiers persistants</text>
  <text x="424" y="370" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">+ index MEMORY.md</text>
  <text x="424" y="389" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#a78bfa" opacity="0.7">persistance</text>

  <!-- 4: MCP -->
  <rect x="506" y="308" width="140" height="90" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="506" y="308" width="140" height="3" rx="1.5" fill="#22d3ee" opacity="0.7"/>
  <text x="576" y="335" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#e6edf3">MCP</text>
  <text x="576" y="354" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">context7 · playwright</text>
  <text x="576" y="370" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">github · calendrier</text>
  <text x="576" y="389" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#22d3ee" opacity="0.7">outils externes</text>

  <!-- 5: Plugins -->
  <rect x="658" y="308" width="140" height="90" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="658" y="308" width="140" height="3" rx="1.5" fill="#818cf8" opacity="0.7"/>
  <text x="728" y="335" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#e6edf3">Plugins</text>
  <text x="728" y="354" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">superpowers</text>
  <text x="728" y="370" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">feature-dev · …</text>
  <text x="728" y="389" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#818cf8" opacity="0.7">comportements</text>

  <!-- 6: Rules -->
  <rect x="810" y="308" width="140" height="90" rx="7" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#box-shadow)"/>
  <rect x="810" y="308" width="140" height="3" rx="1.5" fill="#a78bfa" opacity="0.7"/>
  <text x="880" y="335" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" font-weight="700" fill="#e6edf3">Rules</text>
  <text x="880" y="354" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">Contexte paresseux</text>
  <text x="880" y="370" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#7d8590">paths: · CLAUDE.md</text>
  <text x="880" y="389" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="10" fill="#a78bfa" opacity="0.7">instruction</text>

  <!-- ═══════════════════════════════════════════
       ROW 4: Output/result band  (y=460)
  ═══════════════════════════════════════════ -->

  <!-- Connectors foundations → output -->
  <line x1="120" y1="398" x2="120" y2="448" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="272" y1="398" x2="272" y2="448" stroke="#818cf8" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="424" y1="398" x2="424" y2="448" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="576" y1="398" x2="576" y2="448" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="728" y1="398" x2="728" y2="448" stroke="#818cf8" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <line x1="880" y1="398" x2="880" y2="448" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="2 2" opacity="0.25"/>
  <!-- Horizontal gather line -->
  <line x1="120" y1="448" x2="880" y2="448" stroke="#7d8590" stroke-width="0.8" opacity="0.2"/>
  <line x1="500" y1="448" x2="500" y2="460" stroke="#7d8590" stroke-width="0.8" opacity="0.2" marker-end="url(#arrowhead)"/>

  <!-- Output box -->
  <rect x="280" y="460" width="440" height="60" rx="8" fill="#0f1318" stroke="url(#brand-grad)" stroke-width="1.5" filter="url(#box-shadow)"/>
  <text x="500" y="484" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="12" font-weight="500" fill="#7d8590" letter-spacing="1">SORTIE</text>
  <text x="500" y="505" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="13" font-weight="600" fill="#e6edf3">Code · Fichiers · Actions · Commits · Deploy</text>

  <!-- Footer -->
  <text x="500" y="610" text-anchor="middle"
    font-family="-apple-system, 'Segoe UI', Roboto, sans-serif"
    font-size="11" fill="#7d8590" opacity="0.45">SGRR AGI V2 — Claude Code Power-Rig Scaffold</text>
</svg>
