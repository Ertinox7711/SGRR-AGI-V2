name: secret-scan

# Défense continue : scanne les secrets à chaque push et chaque PR.
# Même si les barrages locaux (.gitignore, pre-commit) sont contournés,
# ce job côté serveur lève l'alerte.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (scan complet de l'historique)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scanne TOUT l'historique, pas juste le dernier commit

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  pii-grep:
    name: garde-fou PII (email / chemins absolus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aucun email réel dans l'auteur des commits
        run: |
          echo "Auteurs trouvés :"
          git log --format='%an <%ae>' | sort -u
          if git log --format='%ae' | grep -Eiv '(noreply|users\.noreply\.github\.com|^$)' | grep -Eq '@'; then
            echo "::error::Un email réel apparaît dans l'auteur d'un commit. Anonymise l'historique."
            git log --format='%ae' | sort -u
            exit 1
          fi
          echo "ok — aucun email réel."

      - name: Aucun chemin home absolu dans les fichiers suivis
        run: |
          # Exclusions : la config gitleaks, les docs (.md), .github, et les
          # SCANNERS eux-mêmes (preflight-scrub, pre-commit) qui contiennent
          # /home/ et /Users/ comme MOTIFS de détection, pas comme fuites.
          if git grep -nIE '([A-Za-z]:\\Users\\[^\\/<> ]+)|(/home/[^/<> ]+)|(/Users/[^/<> ]+)' \
               -- . ':(exclude).gitleaks.toml' ':(exclude)*.md' ':(exclude).github/**' \
                  ':(exclude)scripts/preflight-scrub.*' ':(exclude)scripts/hooks/pre-commit' ; then
            echo "::error::Chemin home absolu détecté dans un fichier suivi."
            exit 1
          fi
          echo "ok — aucun chemin home absolu."
