name: secret-scan

# Continuous defense: scan for secrets on every push and every PR.
# Even if the local barriers (.gitignore, pre-commit) get bypassed,
# this server-side job raises the alarm.

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # scan the WHOLE history, not just the last commit

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  pii-grep:
    name: PII guard (email / absolute paths)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: No real email in the commit author
        run: |
          echo "Authors found:"
          git log --format='%an <%ae>' | sort -u
          if git log --format='%ae' | grep -Eiv '(noreply|users\.noreply\.github\.com|^$)' | grep -Eq '@'; then
            echo "::error::A real email shows up in a commit author. Anonymize the history."
            git log --format='%ae' | sort -u
            exit 1
          fi
          echo "ok — no real email."

      - name: No absolute home path in tracked files
        run: |
          # Exclusions: the gitleaks config, the docs (.md), .github, and the
          # SCANNERS themselves (preflight-scrub, pre-commit) which contain
          # /home/ and /Users/ as DETECTION patterns, not as leaks.
          if git grep -nIE '([A-Za-z]:\\Users\\[^\\/<> ]+)|(/home/[^/<> ]+)|(/Users/[^/<> ]+)' \
               -- . ':(exclude).gitleaks.toml' ':(exclude)*.md' ':(exclude).github/**' \
                  ':(exclude)scripts/preflight-scrub.*' ':(exclude)scripts/hooks/pre-commit' ; then
            echo "::error::Absolute home path detected in a tracked file."
            exit 1
          fi
          echo "ok — no absolute home path."
