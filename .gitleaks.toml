# gitleaks config — SGRR AGI V2
# Extends the default ruleset with domain-specific patterns.
# Docs: https://github.com/gitleaks/gitleaks

title = "SGRR AGI V2 secret scan"

[extend]
useDefault = true   # keep the ~150 built-in rules (AWS, GitHub, Stripe, etc.)

# --- Custom rules ------------------------------------------------------------

[[rules]]
id = "shopify-access-token"
description = "Shopify access/secret token"
regex = '''shp(at|ca|pa|ss)_[a-fA-F0-9]{32}'''
tags = ["shopify", "token"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-[a-zA-Z0-9_\-]{20,}'''
tags = ["anthropic", "key"]

[[rules]]
id = "openai-api-key"
description = "OpenAI API key"
regex = '''sk-[a-zA-Z0-9]{20,}T3BlbkFJ[a-zA-Z0-9]{20,}'''
tags = ["openai", "key"]

[[rules]]
id = "generic-bearer-secret"
description = "Generic high-entropy secret assignment"
regex = '''(?i)(api[_-]?key|secret|token|passwd|password)\s*[:=]\s*['"][a-zA-Z0-9_\-]{24,}['"]'''
tags = ["generic"]

[[rules]]
id = "absolute-home-path"
description = "Absolute user home path (leaks identity)"
regex = '''([A-Za-z]:\\Users\\[^\\/<>"' ]+)|(/home/[^/<>"' ]+)|(/Users/[^/<>"' ]+)'''
tags = ["pii", "path"]

# --- Allowlist: what is NOT a leak ------------------------------------------

[allowlist]
description = "Placeholders, examples, and generic paths that are allowed"
regexes = [
  '''<[A-Z_]+>''',                         # <PLACEHOLDER>, <YOUR_NAME>...
  '''users\.noreply\.github\.com''',       # GitHub noreply email
  '''example\.(com|org)''',
  '''/home/(user|runner|youruser)\b''',    # generic example paths
  '''[A-Za-z]:\\Users\\(you|user|name)\b''',
  '''sk-ant-api03-EXAMPLE''',
]
paths = [
  '''\.gitleaks\.toml$''',                          # this file holds the patterns themselves
  '''(^|/)SECUR(ITE|ITY)\.md$''',                   # security doc cites token shapes + sample paths (FR+EN names live in history)
  '''(^|/)assets/''',                               # decorative SVGs
  '''(^|/)scripts/preflight-scrub\.(ps1|sh)$''',    # scanner script — carries the detection patterns by design
  '''(^|/)scripts/hooks/pre-commit$''',             # pre-commit scanner — same
  '''(^|/)\.github/workflows/secret-scan\.yml$''',  # CI scanner workflow — same
]
